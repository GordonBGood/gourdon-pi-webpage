<!doctype html>
<html>
  <head>
    <meta http-equiv='Content-Type' content='text/html; charset=utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gourdon Prime Counting Function...</title>
    <link rel="stylesheet" href="css/PrimeCounting.css">
    <script src="js/GourdonPrimeCounting.js" defer></script>
  </head>
  <body>
    <div class="title">
      <text>
        Gourdon Prime Counting Function
      </text>
    </div>
    <div>
      <text>
        Top counting limit value:
      </text>
      <input class="input" type="textbox" id="limit" value="1e9" />
    </div>
    <div class="output">
      <text>The enforced limit is zero to 9007199254740991 (2**53-1).</text>
    </div>
    <div class="output">
      <text>Refresh the page to reset to default values or stop processing!
      </text>
    </div>
    <div class="output">
      <text id="output">
          Waiting to start...
      </text>
    </div>
    <div>
      <input class="doit" type="button" id="go" value="Start counting..." />
    </div>
    <div class="output">
      <text>
        Pressing the Enter key is the same as clicking the above button.
      </text>
    </div>
  </body>
</html>
